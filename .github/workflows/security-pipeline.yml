name: Security Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

  pull_request:

jobs:

  lint-and-security:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint pyyaml

      - name: Lint Ansible playbooks
        run: |
          ansible-lint .

      - name: Validate Python scripts
        run: |
          python -m py_compile scripts/*.py

      - name: Validate YAML syntax
        run: |
          python -c "
          import yaml
          yaml.safe_load(open('docker-compose.yml'))
          print('docker-compose.yml OK')
          "

      - name: Display project structure
        run: |
          find .

      - name: Generate comparison report
        run: |
          python scripts/compare_results.py

      - name: Generate HTML security report
        run: |
          python scripts/build_report.py

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/final/

      - name: Security pipeline completed
        run: |
          echo 'Security pipeline executed successfully.'