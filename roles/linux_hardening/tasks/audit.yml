---
- name: Install auditd
  apt:
    name: auditd
    state: present

- name: Try to enable auditd
  systemd:
    name: auditd
    state: started
    enabled: true
  ignore_errors: true

- name: Add audit rules
  lineinfile:
    path: /etc/audit/rules.d/hardening.rules
    line: "{{ item }}"
    create: true
  loop: "{{ audit_rules }}"