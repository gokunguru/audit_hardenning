---
- name: Install ufw
  apt:
    name: ufw
    state: present
    update_cache: true

- name: Default deny incoming
  ufw:
    default: deny
    direction: incoming

- name: Default allow outgoing
  ufw:
    default: allow
    direction: outgoing

- name: Allow SSH
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ linux_allowed_ports }}"

- name: Enable ufw
  ufw:
    state: enabled